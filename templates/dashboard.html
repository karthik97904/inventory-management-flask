{% extends "base.html" %}
{% block content %}

<h3 class="mb-4">Dashboard</h3>

<div class="row">

    <div class="col-md-4">
        <div class="stat-card bg1">
            <h5>Total Products</h5>
            <h2>{{ total_products }}</h2>
        </div>
    </div>

    <div class="col-md-4">
        <div class="stat-card bg2">
            <h5>Total Stock</h5>
            <h2>{{ total_stock }}</h2>
        </div>
    </div>

    <div class="col-md-4">
        <div class="stat-card bg3">
            <h5>System Status</h5>
            <h2>Active</h2>
        </div>
    </div>

</div>

{% endblock %}
