{% extends "base.html" %}
{% block content %}

<h3 class="mb-4">Products</h3>

<div class="card p-3 mb-4">

<form method="POST" action="/add_product" enctype="multipart/form-data" class="row g-2">

    <input name="name" class="form-control col" placeholder="Name">
    <input name="category" class="form-control col" placeholder="Category">
    <input name="supplier" class="form-control col" placeholder="Supplier">
    <input name="price" type="number" class="form-control col" placeholder="Price">
    <input name="stock" type="number" class="form-control col" placeholder="Stock">
    <input type="file" name="image" class="form-control col">

    <button class="btn btn-primary col">Add</button>

</form>

</div>

<div class="card p-3">
<table class="table table-hover">

<thead>
<tr>
<th>Image</th>
<th>Name</th>
<th>Price</th>
<th>Stock</th>
<th>Status</th>
<th></th>
</tr>
</thead>

<tbody>
{% for p in products %}
<tr>

<td>
{% if p.image %}
<img src="/static/uploads/{{p.image}}" width="50">
{% endif %}
</td>

<td>{{ p.name }}</td>
<td>₹ {{ p.price }}</td>
<td>{{ p.stock }}</td>

<td>
{% if p.stock == 0 %}
<span class="badge bg-danger">Out</span>
{% elif p.stock < 5 %}
<span class="badge bg-warning">Low</span>
{% else %}
<span class="badge bg-success">OK</span>
{% endif %}
</td>

<td>
<a href="/delete/{{p.id}}" class="btn btn-sm btn-danger">Delete</a>
</td>

</tr>
{% endfor %}
</tbody>

</table>
</div>

{% endblock %}
