<!DOCTYPE html>
<html>
<head>
    <title>Inventory System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body { background: #f5f7fb; }

        .sidebar {
            width: 240px;
            height: 100vh;
            background: #1e293b;
            position: fixed;
            color: white;
        }

        .sidebar a {
            display: block;
            padding: 12px 20px;
            color: #cbd5e1;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: #334155;
            color: white;
        }

        .main {
            margin-left: 240px;
            padding: 20px;
        }

        .card {
            border: none;
            border-radius: 12px;
        }

        .stat-card {
            padding: 20px;
            color: white;
            border-radius: 12px;
        }

        .bg1 { background: #3b82f6; }
        .bg2 { background: #10b981; }
        .bg3 { background: #f59e0b; }
    </style>
</head>

<body>

<div class="sidebar">
    <h4 class="p-3">Inventory</h4>

    {% if session.get('role') == 'admin' %}
        <a href="/dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a href="/products"><i class="bi bi-box"></i> Products</a>
        <a href="/categories"><i class="bi bi-tags"></i> Categories</a>
        <a href="/orders"><i class="bi bi-cart"></i> Orders</a>
        <a href="/suppliers"><i class="bi bi-truck"></i> Suppliers</a>
    {% endif %}

    {% if session.get('role') == 'customer' %}
        <a href="/customer"><i class="bi bi-shop"></i> Shop</a>
    {% endif %}

    <a href="/logout"><i class="bi bi-box-arrow-right"></i> Logout</a>
</div>

<div class="main">
    {% block content %}{% endblock %}
</div>

</body>
</html>
